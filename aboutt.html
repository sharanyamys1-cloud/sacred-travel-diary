<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - Sacred Travel Diary</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #141E30, #243B55);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .about-container {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      max-width: 700px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      animation: fadeIn 1.2s ease-in-out;
    }

    .about-container img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid #fff;
      margin-bottom: 20px;
      transition: transform 0.4s;
    }

    .about-container img:hover {
      transform: scale(1.1);
    }

    .about-container h1 {
      font-size: 2em;
      margin-bottom: 10px;
      color: #FFD700;
    }

    .about-container p {
      font-size: 1.1em;
      line-height: 1.6;
      color: #f0f0f0;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <div class="about-container">
    <!-- 👇 Replace with your photo -->
    <img src="images/about-bgd.jpg.jpg" alt="My Photo">
    <h1>About Me</h1>
    <p>
      Hi, I’m Sharanya 👋<br>
      Welcome to my Sacred Travel Diary!  
      I love exploring spiritual and holy places across India.  
      This space is where I share my experiences, stories, and pictures from temples like Varanasi, Kedarnath, and Rameswaram.  
    </p>
  </div>
</body>
</html>
